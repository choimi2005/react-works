<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex 예제</title>
</head>
    <style> 
    .container{
            width: 400px;
            height: 300px;
            border: 1px solid #000;
            display: flex;
            gap: 16px;

            align-items: center; /*아이템을 새로 방향으로 중앙 정렬*/
            align-items: start;  /*아이템을 새로 방향으로 시작위치에 정렬*/
            align-items: end;    /*아이템을 새로 방향으로 끝 위치에 정렬*/
            flex-direction: row-reverse; /*아이템을 가로 방향으로 역순 정렬*/
        }
        .box{
            width: 60px;
            height: 60px;
            background-color : skyblue;       
        }

    </style>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>
</html>
