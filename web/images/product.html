<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 관련 예제</title>
    <style>
        h1{color: blue;}
        h2{color: green;}
        p{
            font-family: "바탕체";
            font-size: 18px; /* 기본 16px */
            /*1.2em은 부모 요소의 글자크기의 1.2배 */ 
        }
        .p1
        {         
            background-color: yellow;
            line-height: 2;    /* 한글자 간격 생성*/         
        }
        .p2
        {         
            background-color: skyblue;
            line-height: 1.5;    /* 반글자 간격 생성*/         
        }
    </style>
</head>
<body>
    <h1>세계 10대 푸드</h1>
    <h2>마늘(garlic)</h2>
    <p class="p1">일해백리()는 마늘의 별명이다. 한가지 해가있고 백 가지 이로움이 있다는 뜻이다 <br> 
        그 한가지 해란 아린 맛으로 위에 부담을 준다는 것이다.  </p>
     <p class="p2">
        마늘특유의 아린 맛은 알리신이라는 성분 때문으로 살균 및 <br>
        하나 둘 셋  1234.....
    </p>
</body>
</html>
